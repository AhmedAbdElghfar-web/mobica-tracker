<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MOBICA Tracker"/>
<meta name="theme-color" content="#060E1C"/>
<title>MOBICA Delivery Tracker - Final</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #060E1C;
    --card: #0D1B2E;
    --primary: #3b82f6;
    --text: #ffffff;
    --dim: #94a3b8;
    --yellow: #fbbf24;
  }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 40px; }
  .header { padding: 20px; background: var(--card); border-bottom: 1px solid #1e293b; text-align: center; position: sticky; top: 0; z-index: 100; }
  .container { padding: 15px; max-width: 600px; margin: auto; }
  
  .plan-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #1e293b; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  
  input, select { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
  
  .loc-group { display: flex; gap: 10px; }
  .loc-btn { flex: 1; padding: 12px; background: #1e293b; border: 1px solid #334155; color: var(--dim); border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .loc-btn.active { background: var(--primary); color: white; border-color: #60a5fa; }
  
  .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px; }
  .btn-export { background: #1e293b; color: var(--yellow); border: 1px solid var(--yellow); padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: 600; }

  .progress-bar { height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin: 10px 0; }
  .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
  .stat-val { font-weight: bold; color: var(--yellow); }
</style>
</head>
<body>

<div class="header">
  <h1 style="margin:0; font-size:18px; color:var(--primary);">MOBICA LOGISTICS <span style="color:white">2026</span></h1>
</div>

<div class="container">
  <div class="plan-card">
    <h3 style="margin-top:0; color:var(--primary); font-size:16px;">NEW DELIVERY ENTRY</h3>
    
    <div class="form-group">
      <label>Location Type</label>
      <div class="loc-group">
        <button type="button" id="btn-adv" class="loc-btn active" onclick="setLoc('advanced')">ADV</button>
        <button type="button" id="btn-int" class="loc-btn" onclick="setLoc('intermediate')">INT</button>
      </div>
    </div>

    <div class="form-group">
      <label>OEM / Model</label>
      <select id="f-oem">
        <option value="OEM-01">K-H Series (1500 EGP)</option>
        <option value="OEM-02">K-M Series (1850 EGP)</option>
        <option value="OEM-03">K-L Series (2100 EGP)</option>
        <option value="OEM-04">K-X Series (2450 EGP)</option>
      </select>
    </div>

    <div class="form-group">
      <label>DN Number</label>
      <input type="text" id="f-dn" placeholder="Enter Delivery Note #">
    </div>

    <div class="form-group">
      <label>Quantity</label>
      <input type="number" id="f-qty" value="1" min="1">
    </div>

    <button id="save-btn" class="btn-primary" onclick="saveDelivery()">SAVE TO SUPABASE</button>
    <button class="btn-export" onclick="downloadYearlyReport()">DOWNLOAD 2026 MASTER CSV</button>
  </div>

  <h3 style="color:var(--dim); font-size: 14px; margin-left: 5px;">LIVE PRODUCTION STATUS</h3>
  <div id="plan-container">
    <div style="text-align:center; padding:20px; color:var(--dim);">Loading dashboard...</div>
  </div>
  
  <div id="financial-summary" class="plan-card" style="display:none; border-color: var(--yellow);">
     <div style="color:var(--dim); font-size:11px;">ESTIMATED TOTAL VALUE (2026)</div>
     <div id="total-egp" style="font-size:24px; font-weight:800; color:var(--yellow);">0 <span style="font-size:14px;">EGP</span></div>
  </div>
</div>

<script>
  // Supabase Credentials
  const _URL = 'https://ojsmjqwjsdornetdqiyu.supabase.co';
  const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qc21qcXdqc2Rvcm5ldGRxaXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTM1NTgsImV4cCI6MjA5MTA4OTU1OH0.ThQBFXNp1wC-7bteu95Fuiertz1t69TbyLqpna_rjVQ';
  const supabaseClient = supabase.createClient(_URL, _KEY);

  let selectedLocation = 'advanced';

  function setLoc(val) {
    selectedLocation = val;
    document.getElementById('btn-adv').classList.toggle('active', val === 'advanced');
    document.getElementById('btn-int').classList.toggle('active', val === 'intermediate');
  }

  // Financial calculation logic from original file
  function getEGP(oem, qty) {
    let price = 1200;
    if (oem.includes("OEM-01")) price = 1500;
    if (oem.includes("OEM-02")) price = 1850;
    if (oem.includes("OEM-03")) price = 2100;
    if (oem.includes("OEM-04")) price = 2450;
    return price * qty;
  }

  async function saveDelivery() {
    const btn = document.getElementById('save-btn');
    const oem = document.getElementById('f-oem').value;
    const qty = parseInt(document.getElementById('f-qty').value);
    const dn = document.getElementById('f-dn').value;

    btn.disabled = true;
    btn.innerText = "SAVING...";

    // Saving without egp_value column to avoid DB errors
    const { error } = await supabaseClient.from('deliveries').insert([{
      date: new Date().toISOString(),
      oem: oem,
      qty: qty,
      location: selectedLocation,
      dn: dn
    }]);

    if (error) {
      alert("Error: " + error.message);
    } else {
      document.getElementById('f-dn').value = "";
      document.getElementById('f-qty').value = 1;
      await refreshDashboard();
      alert("Success! Data Synced.");
    }
    btn.disabled = false;
    btn.innerText = "SAVE TO SUPABASE";
  }

  async function refreshDashboard() {
    const { data: deliveries, error } = await supabaseClient.from('deliveries').select('*');
    if(error) return;

    const container = document.getElementById('plan-container');
    container.innerHTML = "";
    
    let grandTotalEGP = 0;
    const oems = ["OEM-01", "OEM-02", "OEM-03", "OEM-04"];

    oems.forEach(oem => {
      const filtered = (deliveries || []).filter(d => d.oem === oem);
      const actual = filtered.reduce((sum, d) => sum + d.qty, 0);
      
      // Calculate EGP for this OEM
      filtered.forEach(d => { grandTotalEGP += getEGP(d.oem, d.qty); });

      const target = 100; // Mock Target
      const pct = Math.min((actual / target) * 100, 100);

      container.innerHTML += `
        <div class="plan-card">
          <div style="display:flex; justify-content:space-between;">
            <span style="font-weight:bold;">${oem}</span>
            <span class="stat-val">${actual} / ${target}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    });

    // Show Financial Summary
    document.getElementById('financial-summary').style.display = "block";
    document.getElementById('total-egp').innerHTML = `${Math.round(grandTotalEGP).toLocaleString()} <span style="font-size:14px;">EGP</span>`;
  }

  async function downloadYearlyReport() {
    const { data: allData, error } = await supabaseClient.from('deliveries').select('*');
    if (error || !allData.length) {
      alert("No data to export.");
      return;
    }

    const header = "Date,OEM,Qty,Value (EGP),Location,DN";
    const rows = allData.map(e => {
      const val = getEGP(e.oem, e.qty);
      return [e.date, e.oem, e.qty, val, e.location||"advanced", e.dn||""].join(",");
    });

    const csv = header + "\n" + rows.join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Mobica_Master_Report_2026.csv";
    a.click();
  }

  window.onload = refreshDashboard;
</script>

</body>
</html>
